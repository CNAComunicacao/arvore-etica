* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {

<script>
// ─── CONFIGURAÇÃO DO FIREBASE ───────────────────────────────────────────────
// Substitua pelo URL do seu projeto Firebase
const FIREBASE_URL = 'https://arvore-etica-default-rtdb.firebaseio.com';
// ────────────────────────────────────────────────────────────────────────────

const CORES = ['#ffffff','#f8f8e8','#e0f8e8','#fff4a0','#c8e8ff','#ffe4b0','#d4f8d8','#fffac0','#d8f0ff','#f8e8d0','#eaffd8','#fff4d0','#e0f4ff','#fffff0','#d8ffe8'];
let exibidas = new Set();

function tamanho(freq, max) {
  const pct = freq / Math.max(max, 1);
  if (pct > 0.8) return '22px';
  if (pct > 0.6) return '20px';
  if (pct > 0.4) return '18px';
  return '16px';
}

async function atualizar() {
  try {
    const r = await fetch(FIREBASE_URL + '/contribuicoes.json');
    const dados = await r.json();
    const lista = dados ? Object.values(dados) : [];
    const freq = {};
    lista.forEach(c => (c.palavras||[]).forEach(p => {
      const k = p.charAt(0).toUpperCase() + p.slice(1).toLowerCase();
      freq[k] = (freq[k]||0) + 1;
    }));
    const entradas = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    const maxF = entradas.length > 0 ? entradas[0][1] : 1;
    const novas = entradas.filter(([p]) => !exibidas.has(p));
    const nuvem = document.getElementById('nuvem');
    if (entradas.length === 0) return;
    if (nuvem.querySelector('.copa-vazia')) nuvem.innerHTML = '';
    novas.forEach(([palavra, fv], i) => {
      const el = document.createElement('span');
      el.className = 'palavra';
      el.textContent = palavra;
      el.style.color = CORES[Math.floor(Math.random() * CORES.length)];
      el.style.fontSize = tamanho(fv, maxF);
      el.style.animationDelay = (i * 0.1) + 's';
      nuvem.appendChild(el);
      exibidas.add(palavra);
    });
    entradas.forEach(([palavra, fv]) => {
      nuvem.querySelectorAll('.palavra').forEach(el => {
        if (el.textContent === palavra) el.style.fontSize = tamanho(fv, maxF);
      });
    });
  } catch(e) { console.warn(e); }
}

atualizar();
setInterval(atualizar, 8000);
</script>
